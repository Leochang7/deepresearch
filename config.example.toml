# DeepResearch Agent - Example Configuration
# Copy this file to config.toml and adjust as needed.

[llm]
provider = "mimo"
model = "mimo-v2.5-pro"
base_url = "https://api.xiaomimimo.com/v1"
api_key_env = "MIMO_API_KEY"
api_key_header = "api-key"
api_key_prefix = ""
api_key_required = true
max_tokens_field = "max_completion_tokens"
max_completion_tokens = 1024
temperature = 1.0
top_p = 0.95
thinking = "disabled"

[embedding]
provider = "openai_compatible"
model = "Qwen3-Embedding-4B"
dim = 2560
base_url = ""
api_key_env = "DEEPRESEARCH_EMBEDDING_API_KEY"
batch_size = 32
timeout_seconds = 60
max_retries = 2
normalize = false
request_dimensions = false

[reranker]
provider = "openai_compatible"
model = "bge-reranker-v2-m3"
base_url = ""
api_key_env = "DEEPRESEARCH_RERANKER_API_KEY"
batch_size = 16
timeout_seconds = 60
max_retries = 2

[milvus]
uri = "http://localhost:19530"
chunks_collection = "deepresearch_chunks"
memories_collection = "deepresearch_memories"
metric_type = "COSINE"
index_type = "HNSW"

[retrieval]
providers = ["local_dataset", "web_search", "mimo_search"]
top_k_documents = 20
top_k_vector = 30
top_k_reranked = 8
search_provider = "tavily"
max_queries_per_task = 5
max_docs_per_task = 20
max_chunks_per_task = 80
request_concurrency = 1

[web_search]
provider = "tavily"
api_key_env = "TAVILY_API_KEY"
timeout_seconds = 30
max_retries = 2

[mimo_search]
enabled = true
max_keyword = 3
force_search = true
limit = 5

[fetch]
enabled = true
timeout_seconds = 20
max_retries = 2
user_agent = "DeepResearchAgent/0.1"

[chunking]
chunk_size_chars = 1200
chunk_overlap_chars = 200
min_chunk_chars = 300

[dedup]
strategy = "source_url_content_hash"

[lexical]
tokenizer = "builtin" # builtin | jieba
latin_min_chars = 2
cjk_ngrams = [1, 2]
cjk_ngram_fallback = true
userdict_path = ""

[executor]
max_concurrency = 1
max_task_retries = 2
task_timeout_seconds = 180
global_timeout_seconds = 1800
max_llm_calls_per_run = 80

[red_blue]
max_rounds = 3
target_score = 0.85
min_score_delta = 0.03
oscillation_window = 2

[synthesizer]
report_profile = "tech_research"

[langfuse]
enabled = false
host = "https://cloud.langfuse.com"
experiment_name = "deepresearch"
prompt_provider = "local" # local | langfuse | langfuse_with_local_fallback
prompt_label = "production"

[evidence_quality]
min_confidence = 0.3
min_token_overlap = 0.1

[fusion]
rrf_k = 60
max_fused_docs = 20
max_fused_chunks = 30
mmr_lambda = 0.7
max_mmr_results = 12

[benchmark]
max_concurrency = 1
